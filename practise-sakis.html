<!DOCTYPE html>
<html>
  <head>
  <title>CalculatorPro</title> 
  <style>
    
  .Box{
    display: grid; 
    justify-content: center;
    align-items: center;
    height: 100vh;
    
  }
  .container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    width: 300px;
    padding: 20px;
    background-color: black;
    gap: 10px;
    border-radius: 5px;
  }

  #display {
    grid-column: 1 / -1;
    height: 70px;
    color:white;
    background-color: black;
    border: none;
    text-align: right;
    font-size: 40px;
    padding-right: 10px;
  }
  #display:focus{
  outline:none;
  }
  
  .Btn {  
    font-size: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    color: white;
    background-color: rgb(77, 77, 77);
    cursor: pointer;
  }
  .backspace{ 
    width: 100%;
    height: 40px;
    grid-column: 1 / -1;
    margin-bottom: 8px;
    grid-column: 4;
    background-color: black;
    border: none;
    color: rgb(4, 229, 4);
    font-size: 20px;
    cursor: pointer; 
   }
  .green {
    color: white;
    background-color: rgb(4, 229, 4);
   }
  .white{ 
    color: black;
    background-color: white;
  }
 
  .grey {
    background-color: grey;
  }
  </style>
  </head>
  <body>
    <div class="Box">
    <div class="container">
    <div id="display">0</div>
    <button class="Btn backspace">⌫</button>
    <button class="Btn grey">C</button>
    <button class="Btn grey">()</button>
    <button class="Btn grey">%</button>
    <button class="Btn white">/</button>
    <button class="Btn">7</button>
    <button class="Btn">8</button>
    <button class="Btn">9</button>
    <button class="Btn white">*</button>
    <button class="Btn">4</button>
    <button class="Btn">5</button>
    <button class="Btn">6</button>
    <button class="Btn white">-</button>
    <button class="Btn">1</button>
    <button class="Btn">2</button>
    <button class="Btn">3</button>
    <button class="Btn white">+</button>
    <button class="Btn">+/-</button>
    <button class="Btn">0</button>
    <button class="Btn">,</button>
    <button class="Btn green">=</button>
    </div>
    </div>
    <script>
    const display = document.getElementById("display");
    const buttons = document.querySelectorAll(".Btn");

  buttons.forEach(button => {
   button.addEventListener("click", () => {
    const value = button.textContent;

    // BACKSPACE
    if (value === "⌫") {
      display.textContent = display.textContent.slice(0, -1);
      if (display.textContent === "") {
        display.textContent = "0";
      }
      return;
    }

    // EQUALS
    if (value === "=") {
      try {
        display.textContent = eval(display.textContent);
      } catch {
        display.textContent = "Error";
      }
      return;
    }

    // CLEAR (αν το χρειαστείς μετά)
    if (value === "C") {
      display.textContent = "0";
      return;
    }

    if (value === "%") {
      display.textContent = Number(display.textContent) / 100
      return;
    }

    // NORMAL INPUT
    if (display.textContent === "0") {
      display.textContent = value;
    } else {
      display.textContent += value;
    }
 
  });
});
    
    </script>
  </body>
</html>
